name: MAREA — Ciclo intradía

# ─────────────────────────────────────────────────────────────────────────────
# Ejecuta la cadena intradía (ingesta → scores → análisis → alertas) tres veces
# al día, coincidiendo con la sesión de EE. UU.
#
# Los horarios objetivo están en hora ESPAÑOLA PENINSULAR. El cron de GitHub
# Actions SIEMPRE va en UTC. La conversión de abajo asume horario de VERANO
# (CEST = UTC+2), que es lo vigente cuando se despliega.
#
#   Hora España (verano, UTC+2)   →   UTC (cron)
#   ───────────────────────────       ──────────
#   15:30  apertura USA            →   13:30
#   18:00  media sesión USA        →   16:00
#   20:00  tarde USA               →   18:00
#
# ⚠️ HORARIO DE INVIERNO: del último domingo de octubre al último de marzo,
#    España pasa a CET = UTC+1. Entonces estos cron se "adelantan" una hora
#    en hora local (p. ej. 13:30 UTC serían las 14:30 españolas, no las 15:30).
#    Para mantener los horarios locales en invierno, RESTA una hora a cada
#    minuto/hora UTC de abajo: 12:30, 15:00 y 17:00 UTC respectivamente.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 13 * * *"   # 15:30 España (verano) — apertura USA
    - cron: "0 16 * * *"    # 18:00 España (verano) — media sesión USA
    - cron: "0 18 * * *"    # 20:00 España (verano) — tarde USA
  workflow_dispatch:          # permite lanzarlo a mano desde la pestaña «Actions»

# Evita solapes si una ejecución se alarga más que el hueco hasta la siguiente.
concurrency:
  group: marea-intraday
  cancel-in-progress: false

jobs:
  intraday-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar ciclo intradía
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SCHEDULER_ENABLED:   "false"   # el cron lo lleva GitHub, no APScheduler
        run: python -m scripts.run_intraday_cycle
